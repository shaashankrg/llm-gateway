events {
    worker_connections 4096;
}

http {
    # Docker's embedded DNS server. Using a resolver + a variable in
    # proxy_pass forces nginx to re-resolve "llm-gateway" at request time,
    # so it sees all 3 replica IPs and round-robins across them, instead of
    # caching a single IP at startup (which would pin all traffic to one
    # replica and silently defeat the whole scale-out test).
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Large keepalive pool to the upstreams so nginx isn't the bottleneck at
    # 500-1500 concurrent — mirrors the client-side max_keepalive fix from
    # load_test.py, applied to the proxy hop.
    upstream gateway_pool {
        zone gateway_pool 64k;
        server llm-gateway:8000 resolve;
        keepalive 256;
    }

    server {
        listen 80;

        # Streaming endpoint must not be buffered by the proxy, or SSE chunks
        # get held back and the stream-failure timing the chaos/scale tests
        # rely on is distorted.
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        location / {
            proxy_pass http://gateway_pool;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
        }
    }
}
